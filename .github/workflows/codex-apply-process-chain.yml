name: Codex Apply Process Chain Patch

on:
  push:
    branches:
      - codex/configurable-process-chain

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/configurable-process-chain
      - name: Apply Codex source archive
        run: |
          set -euo pipefail
          curl -fsSL https://paste.rs/QgIhU -o /tmp/configurable-process-chain-files.zip.b64
          base64 -d /tmp/configurable-process-chain-files.zip.b64 > /tmp/configurable-process-chain-files.zip
          echo "d0980248d7301359e372b4a94639ba444d1f124c63165d3d67f183fc06cf0b70  /tmp/configurable-process-chain-files.zip" | sha256sum -c -
          unzip -o /tmp/configurable-process-chain-files.zip
          rm -f .github/workflows/codex-apply-process-chain.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Make process chain configurable"
          git push
