name: Codex Apply Process Chain Patch

on:
  push:
    branches:
      - codex/configurable-process-chain

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/configurable-process-chain
      - name: Apply Codex patch
        run: |
          set -euo pipefail
          curl -fsSL https://paste.rs/LY0Xg -o /tmp/configurable-process-chain.patch.b64
          base64 -d /tmp/configurable-process-chain.patch.b64 > /tmp/configurable-process-chain.patch
          echo "7662fa57578cfc5de1477902dbad31d870a50a51b5130c78865049b5aa69abe7  /tmp/configurable-process-chain.patch" | sha256sum -c -
          git apply --check /tmp/configurable-process-chain.patch
          git apply /tmp/configurable-process-chain.patch
          rm -f .github/workflows/codex-apply-process-chain.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Make process chain configurable"
          git push
